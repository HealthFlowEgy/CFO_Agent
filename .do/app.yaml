# DigitalOcean App Platform spec — HealthFlow CFO Copilot V0.2
#
# Provisions:
#   - api (FastAPI + agent stack)
#   - web (Next.js 15 workspace)
#   - cfo-db (DigitalOcean Managed Postgres 16, 1 GB dev cluster)
#
# One-click deploy:
#   https://cloud.digitalocean.com/apps/new?repo=https://github.com/healthflowegy/cfo_agent/tree/claude/healthflow-cfo-srs-4WILe
#
# Or via doctl:
#   doctl apps create --spec .do/app.yaml
#
# After import you MUST set the ANTHROPIC_API_KEY secret on the api component
# (Apps → cfo-copilot → api → Settings → Environment). Without it the system
# runs in mock mode (still demoable end-to-end).

name: cfo-copilot
region: fra   # Frankfurt — closest DO region to Egypt
features:
  - buildpack-stack=ubuntu-22

databases:
  - name: cfo-db
    engine: PG
    version: "16"
    production: false        # dev cluster (~$15/mo). Switch to true for HA prod.
    cluster_name: cfo-db
    db_name: cfo
    db_user: cfo

services:
  # -----------------------------
  # Backend: FastAPI + agent stack
  # -----------------------------
  - name: api
    dockerfile_path: apps/api/Dockerfile
    source_dir: apps/api
    github:
      repo: healthflowegy/cfo_agent
      branch: claude/healthflow-cfo-srs-4WILe
      deploy_on_push: true
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs   # 1 vCPU / 1 GB
    health_check:
      http_path: /api/health
      initial_delay_seconds: 20
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 5
    envs:
      # Operator sets in DO console after import (Type: SECRET).
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      # Auto-rotate after first deploy.
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "rotate-me-in-do-console"
      # DO injects the connection string from the managed cluster.
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${cfo-db.DATABASE_URL}
      - key: MODEL_CONDUCTOR
        scope: RUN_TIME
        value: claude-opus-4-5
      - key: MODEL_SPECIALIST
        scope: RUN_TIME
        value: claude-sonnet-4-5
      - key: MODEL_HAIKU
        scope: RUN_TIME
        value: claude-haiku-4-5
      # Allow the web component to call this API (DO substitutes its public URL).
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: ${web.PUBLIC_URL}

  # -----------------------------
  # Frontend: Next.js workspace
  # -----------------------------
  - name: web
    dockerfile_path: apps/web/Dockerfile
    source_dir: apps/web
    github:
      repo: healthflowegy/cfo_agent
      branch: claude/healthflow-cfo-srs-4WILe
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: basic-xs
    health_check:
      http_path: /login
      initial_delay_seconds: 25
      period_seconds: 15
      timeout_seconds: 5
      failure_threshold: 5
    envs:
      - key: NEXT_PUBLIC_API_URL
        scope: RUN_AND_BUILD_TIME
        value: ${api.PUBLIC_URL}
      - key: NODE_ENV
        scope: RUN_TIME
        value: production

services:
  api:
    build: ./apps/api
    container_name: cfo_api
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - DB_PATH=/data/cfo.db
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - MODEL_CONDUCTOR=${MODEL_CONDUCTOR:-claude-opus-4-5}
      - MODEL_SPECIALIST=${MODEL_SPECIALIST:-claude-sonnet-4-5}
      - MODEL_HAIKU=${MODEL_HAIKU:-claude-haiku-4-5}
    volumes:
      - cfo_data:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    build: ./apps/web
    container_name: cfo_web
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NODE_ENV=development
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  cfo_data:
